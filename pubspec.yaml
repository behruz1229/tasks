name: tasks
description: "Планировщик задач с таймером, уведомлениями и статистикой"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.2.1
  flutter_launcher_icons: ^0.14.1
  provider: ^6.1.2
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  audioplayers: ^6.1.0
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: "assets/icon.png"